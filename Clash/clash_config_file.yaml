mixed-port: 7893
allow-lan: false
mode: rule
log-level: warning
ipv6: false
unified-delay: false
tcp-concurrent: true
find-process-mode: off
global-client-fingerprint: chrome
external-controller: 127.0.0.1:9090
secret: ''
profile:
  store-selected: true
  store-fake-ip: true
geodata-mode: true
geodata-loader: standard
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  skip-domain:
  - Mijia Cloud
  - dlg.io.mi.com
  - +.push.apple.com
  force-domain:
  - +.v2ex.com
  - +.netflix.com
  - +.nflxvideo.net
  - +.disney.com
  - +.disneyplus.com
# =============================================
# 本地节点（可选）
# 如只使用机场订阅，可保持为空
# =============================================
proxies: []
# =============================================
# 机场订阅 - 在此处添加机场订阅链接
# 添加新订阅后无需修改其他位置，include-all-providers 会自动引入
# =============================================
proxy-providers:
  Provider1:
    type: http
    # 粘贴你的订阅链接到这里
    url: "https://REPLACE_ME_SUBSCRIPTION_URL"
    path: ./proxies/provider1.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600
      lazy: true
  Provider2:
    type: http
    url: "https://REPLACE_ME_SUBSCRIPTION_URL"
    path: ./proxies/provider2.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600
      lazy: true

proxy-groups:
- name: 节点选择
  type: select
  include-all: true
  include-all-providers: true
  proxies:
  - 自动选择
  - 故障转移
  - 负载均衡
  - 直连
- name: 自动选择
  type: url-test
  include-all: true
  include-all-providers: true
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true
- name: 故障转移
  type: fallback
  include-all: true
  include-all-providers: true
  url: https://www.gstatic.com/generate_204
  interval: 300
  lazy: true
- name: 负载均衡
  type: load-balance
  strategy: consistent-hashing
  include-all: true
  include-all-providers: true
  url: https://www.gstatic.com/generate_204
  interval: 300
  lazy: true
# ---- 地区分组（按节点名自动匹配）----
- name: 🇺🇸 美国
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)US|美国|United States|洛杉矶|硅谷|达拉斯|西雅图|纽约"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇭🇰 香港
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)HK|香港|Hong Kong"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇯🇵 日本
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)JP|日本|Japan|东京|大阪"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇸🇬 新加坡
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)SG|新加坡|Singapore"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇹🇼 台湾
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)TW|台湾|Taiwan"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇬🇧 英国
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)UK|GB|英国|United Kingdom|伦敦"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇰🇷 韩国
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)KR|韩国|Korea|首尔"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇵🇱 波兰
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)PL|波兰|Poland|华沙"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
# ---- 服务分组 ----
- name: AI服务
  type: select
  proxies:
  - 🇺🇸 美国
  - 节点选择
  - 自动选择
  - 直连
- name: 流媒体
  type: select
  proxies:
  - 节点选择
  - 🇭🇰 香港
  - 🇺🇸 美国
  - 🇯🇵 日本
  - 🇸🇬 新加坡
  - 🇹🇼 台湾
  - 自动选择
  - 直连
- name: 国外网站
  type: select
  proxies:
  - 节点选择
  - 🇺🇸 美国
  - 🇭🇰 香港
  - 🇯🇵 日本
  - 🇸🇬 新加坡
  - 自动选择
  - 直连
- name: 国内网站
  type: select
  proxies:
  - 直连
  - 节点选择
- name: 漏网之鱼
  type: select
  proxies:
  - 节点选择
  - 自动选择
  - 直连
- name: 广告拦截
  type: select
  proxies:
  - REJECT
  - 直连
- name: 直连
  type: select
  proxies:
  - DIRECT
