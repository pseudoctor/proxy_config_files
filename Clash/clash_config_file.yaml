  include-all: true
  include-all-providers: true
  filter: "(?i)PL|波兰|Poland|华沙"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
# ---- 服务分组 ----
- name: AI服务
  type: select
  proxies:
  - 🇺🇸 美国
  - 节点选择
  - 自动选择
  - 直连
- name: 流媒体
  type: select
  proxies:
  - 节点选择
  - 🇭🇰 香港
  - 🇺🇸 美国
  - 🇯🇵 日本
  - 🇸🇬 新加坡
  - 🇹🇼 台湾
  - 自动选择
  - 直连
- name: 国外网站
  type: select
  proxies:
  - 节点选择
  - 🇺🇸 美国
  - 🇭🇰 香港
  - 🇯🇵 日本
  - 🇸🇬 新加坡
  - 自动选择
  - 直连
- name: 国内网站
  type: select
  proxies:
  - 直连
  - 节点选择
- name: 漏网之鱼
  type: select
  proxies:
  - 节点选择
  - 自动选择
  - 直连
- name: 广告拦截
  type: select
  proxies:
  - REJECT
  - 直连
- name: 直连
  type: select
  proxies:
  - DIRECT
