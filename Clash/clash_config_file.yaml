  include-all-providers: true
  filter: "(?i)SG|新加坡|Singapore"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇹🇼 台湾
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)TW|台湾|Taiwan"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇬🇧 英国
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)UK|GB|英国|United Kingdom|伦敦"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇰🇷 韩国
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)KR|韩国|Korea|首尔"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇵🇱 波兰
