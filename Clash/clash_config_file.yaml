dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  fake-ip-filter:
  - "*.lan"
  - "*.local"
  - "+.msftconnecttest.com"
  - "+.msftncsi.com"
  - "+.srv.nintendo.net"
  - "+.stun.playstation.net"
  - "+.xboxlive.com"
  - "+.pool.ntp.org"
  - "+.ntp.org.cn"
  - "time.*.com"
  - "time.*.gov"
  - "+.push.apple.com"
  - "+.cmpassport.com"
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  nameserver-policy:
    "geosite:private":
    - https://dns.alidns.com/dns-query
