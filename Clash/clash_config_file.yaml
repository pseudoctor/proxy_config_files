mixed-port: 7893
allow-lan: false
mode: rule
log-level: warning
ipv6: false
unified-delay: false
tcp-concurrent: true
find-process-mode: off
global-client-fingerprint: chrome
external-controller: 127.0.0.1:9090
secret: ''
profile:
  store-selected: true
  store-fake-ip: true
geodata-mode: true
geodata-loader: standard
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  skip-domain:
  - Mijia Cloud
  - dlg.io.mi.com
  - +.push.apple.com
  force-domain:
  - +.v2ex.com
  - +.netflix.com
  - +.nflxvideo.net
  - +.disney.com
  - +.disneyplus.com
