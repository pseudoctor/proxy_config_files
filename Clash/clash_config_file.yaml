# =============================================
# 机场订阅 - 在此处添加机场订阅链接
# 添加新订阅后无需修改其他位置，include-all-providers 会自动引入
# =============================================
proxy-providers:
  PQ2025:
    type: http
    url: "<REDACTED_SUBSCRIPTION_URL>"
    path: ./proxies/pq2025.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600
      lazy: true
  HostUNO:
    type: http
    url: "<REDACTED_SUBSCRIPTION_URL>"
    path: ./proxies/hostuno.yaml
    interval: 86400
    override:
      additional-prefix: "[PL] "
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 600
      lazy: true

proxy-groups:
- name: 节点选择
  type: select
  include-all: true
  include-all-providers: true
  proxies:
  - 自动选择
  - 故障转移
  - 负载均衡
  - 直连
- name: 自动选择
  type: url-test
  include-all: true
  include-all-providers: true
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true
- name: 故障转移
  type: fallback
  include-all: true
  include-all-providers: true
  url: https://www.gstatic.com/generate_204
  interval: 300
  lazy: true
- name: 负载均衡
  type: load-balance
  strategy: consistent-hashing
  include-all: true
  include-all-providers: true
  url: https://www.gstatic.com/generate_204
  interval: 300
  lazy: true
# ---- 地区分组（按节点名自动匹配）----
- name: 🇺🇸 美国
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)US|美国|United States|洛杉矶|硅谷|达拉斯|西雅图|纽约|racknerd"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
- name: 🇭🇰 香港
  type: url-test
  include-all: true
  include-all-providers: true
  filter: "(?i)HK|香港|Hong Kong"
  url: https://www.gstatic.com/generate_204
  interval: 600
  tolerance: 50
  lazy: true
