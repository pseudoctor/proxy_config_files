# MITM
# ✅ 优化：补充 Apple 系及腾讯 CDN 域名到 excludes
#    防止 MITM 拦截直连流量导致证书错误或连接异常
mitm:
  ca_p12: egern.p12
  ca_passphrase: egern
  hostnames:
    excludes:
      # Apple 系（走 DIRECT，必须排除 MITM）
      - "*.apple.com"
      - "*.icloud.com"
      - "*.mzstatic.com"
      - "*.apple-dns.net"
      - "*.cdn-apple.com"
      # 微信 / 支付宝（含证书绑定，强制排除）
      - "*.wechat.com"
      - "*.weixin.com"
      - "*.alipay.com"
      # 微软系
      - "*.microsoft.com"
      - "*.live.com"
      - "*.office.com"
      # GitHub 系（避免 TLS/证书拦截导致网页、Git、CLI 连接异常）
      # ✅ 补充根域名，*.github.com 不覆盖 github.com 本身
      - "github.com"
      - "*.github.com"
      - "githubusercontent.com"
      - "*.githubusercontent.com"
      - "githubassets.com"
      - "*.githubassets.com"
      - "github.io"
      - "*.github.io"
      - "githubcopilot.com"
      - "*.githubcopilot.com"
      - "*.git-lfs.github.com"
      - "*.api.github.com"
      - "*.codeload.github.com"
      # 腾讯系（含 CDN，避免 MITM 干扰）
      - "*.qq.com"
      - "*.tencent.com"
      - "*.qcloud.com"
      - "*.tencentcloud.com"
      - "*.gtimg.com"
      - "*.qpic.cn"
      # jsDelivr CDN（规则集下载链路，排除 MITM 避免证书干扰）
      - "*.jsdelivr.net"

# 模块配置
modules:
