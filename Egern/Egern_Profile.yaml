# 路由规则
rules:
  # ── 最高优放行：内网与时间同步 ──
  - rule_set:
      match: https://cdn.jsdelivr.net/gh/jnlaoshu/MySelf@main/Egern/Rule/Lan.yaml
      policy: DIRECT
  - domain_suffix:
      match: ntp.org
      policy: DIRECT
  - domain_suffix:
      match: time.apple.com
      policy: DIRECT
  - domain_suffix:
      match: time.cloudflare.com
      policy: DIRECT

  # ── ✅ 修复 #15：基础设施硬编码保护（规则集下载 / 订阅更新必须先于一切规则集加载）──
  # jsDelivr CDN：所有规则集 URL 均依赖此域名，必须保证可达
  - domain_suffix:
      match: cdn.jsdelivr.net
      policy: PROXY
  - domain_suffix:
      match: jsdelivr.net
      policy: PROXY
  # ── ✅ 修复 #13：GitHub 系硬编码（防冷启动死锁，必须在所有 rule_set 之前）──
  # 原因：rule_set URL 本身含 raw.githubusercontent.com，
  # 若 GitHub 走规则集匹配，规则集未加载时无法判断策略 → 死锁
  - domain_suffix:
      match: github.com
      policy: GitHub
  - domain_suffix:
      match: githubusercontent.com
      policy: GitHub
  - domain_suffix:
      match: githubassets.com
      policy: GitHub
  - domain_suffix:
      match: github.io
      policy: GitHub
  - domain_suffix:
      match: githubcopilot.com
      policy: GitHub
  - domain_suffix:
      match: npmjs.org
      policy: GitHub

